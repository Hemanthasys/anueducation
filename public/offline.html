<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline</title>
    <style>
        body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;font-family:'Segoe UI',system-ui,sans-serif;color:#1a3a6b;text-align:center;padding:24px;box-sizing:border-box;}
        .card{max-width:360px;}
        h1{font-size:1.1rem;margin:0 0 8px;}
        p{font-size:0.9rem;color:#6b7280;margin:0;}
        button{margin-top:20px;padding:10px 20px;border-radius:8px;border:none;background:#1a3a6b;color:#fff;font-size:0.85rem;font-weight:600;cursor:pointer;}
    </style>
</head>
<body>
    <div class="card">
        <h1>You're offline</h1>
        <p>This page hasn't been loaded before, so it isn't available offline yet. Once you're back online, visit it once and it will be cached for offline use.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
